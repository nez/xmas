<!DOCTYPE html>
<html><head>
<title>xmas</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm/css/xterm.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/addon-fit/lib/addon-fit.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit/lib/addon-fit.js"></script>
<style>html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#1a1a1a}
#t{width:100%;height:100%}</style>
</head><body>
<div id="t"></div>
<script>
const term = new window.Terminal({cursorBlink:true, fontSize:14, theme:{background:'#1a1a1a'}});
const fit = new window.FitAddon.FitAddon();
term.loadAddon(fit);
term.open(document.getElementById('t'));
fit.fit();
window.addEventListener('resize', () => fit.fit());

const ws = new WebSocket(`ws://${location.host}/ws`);
ws.onmessage = e => { term.reset(); term.write(e.data); };
ws.onclose = () => term.write('\r\n[disconnected]');

term.onKey(({key, domEvent}) => {
  const k = domEvent;
  let msg = null;

  if (k.ctrlKey && !k.altKey) {
    const ch = String.fromCharCode(k.keyCode + 32);
    msg = '[:ctrl \\\\' + ch + ']';
  } else if (k.altKey && !k.ctrlKey) {
    const ch = k.key.length === 1 ? k.key : null;
    if (ch) msg = '[:meta \\\\' + ch + ']';
  } else if (k.key === 'Backspace') {
    msg = ':backspace';
  } else if (k.key === 'Enter') {
    msg = ':return';
  } else if (k.key === 'Tab') {
    msg = ':tab';
  } else if (k.key === 'Escape') {
    msg = ':escape';
  } else if (k.key === 'ArrowUp') {
    msg = ':up';
  } else if (k.key === 'ArrowDown') {
    msg = ':down';
  } else if (k.key === 'ArrowLeft') {
    msg = ':left';
  } else if (k.key === 'ArrowRight') {
    msg = ':right';
  } else if (k.key === 'Home') {
    msg = ':home';
  } else if (k.key === 'End') {
    msg = ':end';
  } else if (key.length === 1 && !k.ctrlKey && !k.altKey) {
    msg = JSON.stringify(key);
  }

  if (msg && ws.readyState === 1) ws.send(msg);
});
</script>
</body></html>
